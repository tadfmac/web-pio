- name: Force full sync (first run, overwrite only)
  if: ${{ !exists('.b-dependency-version') }}
  run: |
    echo "First run: full sync (overwrite mode)"

    mkdir -p deps/drivers

    for dir in B/packages/*; do
      name=$(basename "$dir")

      # 除外チェック
      if grep -qx "$name" deps/excluded.txt 2>/dev/null; then
        echo "Skip $name"
        continue
      fi

      if [ -f "$dir/index.js" ]; then
        echo "Overwrite $name"
        cp -f "$dir/index.js" "deps/drivers/$name.js"
      fi
    done
