name: Sync chirimen drivers

on:
  schedule:
    - cron: "0 18 * * 6"  # 毎週 土曜 18:00 UTC = 日曜 03:00 JST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout A (web-pio)
        uses: actions/checkout@v4

      - name: Get latest commit of B
        id: get_b
        run: |
          echo "sha=$(git ls-remote https://github.com/chirimen-oh/chirimen-drivers.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - name: Read previous SHA
        id: prev
        run: |
          if [ -f .b-dependency-version ]; then
            echo "sha=$(cat .b-dependency-version)" >> $GITHUB_OUTPUT
          else
            echo "sha=none" >> $GITHUB_OUTPUT
          fi

      - name: Clone B
        run: |
          git clone --depth=50 https://github.com/chirimen-oh/chirimen-drivers.git B

      # -------------------------------
      # 初回判定（existsの代替）
      # -------------------------------
      - name: Check first run
        id: first
        run: |
          if [ ! -f .b-dependency-version ]; then
            echo "first=true" >> $GITHUB_OUTPUT
          else
            echo "first=false" >> $GITHUB_OUTPUT
          fi

      # -------------------------------
      # 初回フル同期（上書きのみ）
      # -------------------------------
      - name: First run full sync (overwrite only)
        if: steps.first.outputs.first == 'true'
        run: |
          echo "=== FIRST RUN: FULL SYNC ==="

          mkdir -p deps/drivers

          for dir in B/packages/*; do
            name=$(basename "$dir")

            # 除外チェック
            if grep -qx "$name" deps/excluded.txt 2>/dev/null; then
              echo "Skip $name"
              continue
            fi

            if [ -f "$dir/index.js" ]; then
              echo "Overwrite $name"
              cp -f "$dir/index.js" "deps/drivers/$name.js"
            fi
          done

      # -------------------------------
      # 差分検知（2回目以降のみ）
      # -------------------------------
      - name: Detect changes
        if: steps.first.outputs.first == 'false'
        run: |
          cd B

          git fetch --depth=50 origin ${{ steps.get_b.outputs.sha }}

          git diff --name-status ${{ steps.prev.outputs.sha }} ${{ steps.get_b.outputs.sha }} \
            | grep "^.    packages/" \
            | grep "/index.js" \
            > ../changes.txt || true

      - name: Extract target dirs
        if: steps.first.outputs.first == 'false'
        run: |
          if [ ! -s changes.txt ]; then
            echo "No changes"
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi

          awk '{print $1, $2}' changes.txt \
            | sed 's#packages/##' \
            | cut -d'/' -f1 \
            | sort -u > all_dirs.txt

          grep -v -F -f deps/excluded.txt all_dirs.txt > target_dirs.txt || true

          echo "=== TARGET DIRS ==="
          cat target_dirs.txt || true

      # -------------------------------
      # 差分適用（追加・更新・削除）
      # -------------------------------
      - name: Apply changes
        if: steps.first.outputs.first == 'false' && env.skip != 'true'
        run: |
          mkdir -p deps/drivers

          while read dir; do
            [ -z "$dir" ] && continue

            status=$(grep "packages/$dir/index.js" changes.txt | head -n1 | cut -f1)

            if [ "$status" = "D" ]; then
              echo "Deleting $dir"
              rm -f "deps/drivers/$dir.js"
            else
              if [ -f "B/packages/$dir/index.js" ]; then
                echo "Updating $dir"
                cp -f "B/packages/$dir/index.js" "deps/drivers/$dir.js"
              fi
            fi
          done < target_dirs.txt

      # -------------------------------
      # バージョン更新
      # -------------------------------
      - name: Update version file
        run: |
          echo "${{ steps.get_b.outputs.sha }}" > .b-dependency-version

      # -------------------------------
      # PR作成
      # -------------------------------
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync-chirimen-drivers
          commit-message: "Sync drivers from chirimen-drivers"
          title: "Sync drivers from chirimen-drivers"
          body: |
            Auto-sync from chirimen-drivers (/packages)

            - Weekly sync (Sunday midnight JST)
            - Includes add/update/delete
            - First run = full overwrite
            - Excludes dirs from deps/excluded.txt
