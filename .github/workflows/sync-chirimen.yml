name: Sync chirimen drivers

on:
  schedule:
    - cron: "0 18 * * 6"  # 日曜 03:00 JST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout A (web-pio)
        uses: actions/checkout@v4

      - name: Get latest commit of B
        id: get_b
        run: |
          echo "sha=$(git ls-remote https://github.com/chirimen-oh/chirimen-drivers.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - name: Read previous SHA
        id: prev
        run: |
          if [ -f .b-dependency-version ]; then
            echo "sha=$(cat .b-dependency-version)" >> $GITHUB_OUTPUT
          else
            echo "sha=none" >> $GITHUB_OUTPUT
          fi

      - name: Clone B (full clone for safety)
        run: |
          git clone https://github.com/chirimen-oh/chirimen-drivers.git B

      # -------------------------------
      # 初回判定
      # -------------------------------
      - name: Check first run
        id: first
        run: |
          if [ "${{ steps.prev.outputs.sha }}" = "none" ]; then
            echo "first=true" >> $GITHUB_OUTPUT
          else
            echo "first=false" >> $GITHUB_OUTPUT
          fi

      # -------------------------------
      # SHA存在チェック（重要）
      # -------------------------------
      - name: Validate previous SHA
        id: validate
        run: |
          cd B
          if [ "${{ steps.prev.outputs.sha }}" = "none" ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
          elif git cat-file -e ${{ steps.prev.outputs.sha }}^{commit} 2>/dev/null; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      # -------------------------------
      # 初回 or fallback フル同期
      # -------------------------------
      - name: Full sync (first or fallback)
        if: steps.first.outputs.first == 'true' || steps.validate.outputs.valid == 'false'
        run: |
          echo "=== FULL SYNC MODE ==="

          mkdir -p deps/drivers

          for dir in B/packages/*; do
            name=$(basename "$dir")

            if grep -qx "$name" deps/excluded.txt 2>/dev/null; then
              echo "Skip $name"
              continue
            fi

            if [ -f "$dir/$name.js" ]; then
              echo "Overwrite $name"
              cp -f "$dir/$name.js" "deps/drivers/$name.js"
            elif [ -f "$dir/index.js" ]; then
              echo "Overwrite $name (index.js)"
              cp -f "$dir/index.js" "deps/drivers/$name.js"
            fi
          done

      # -------------------------------
      # 差分検知
      # -------------------------------
      - name: Detect changes
        if: steps.first.outputs.first == 'false' && steps.validate.outputs.valid == 'true'
        run: |
          cd B

          git diff --name-status ${{ steps.prev.outputs.sha }} ${{ steps.get_b.outputs.sha }} \
            | grep $'^.\tpackages/' \
            > ../changes.txt || true

      - name: Extract target dirs
        if: steps.first.outputs.first == 'false' && steps.validate.outputs.valid == 'true'
        run: |
          if [ ! -s changes.txt ]; then
            echo "No changes"
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi

          cut -f2 changes.txt \
            | sed 's#packages/##' \
            | cut -d'/' -f1 \
            | sort -u > all_dirs.txt

          grep -v -F -f deps/excluded.txt all_dirs.txt > target_dirs.txt || true

          echo "=== TARGET DIRS ==="
          cat target_dirs.txt || true

      # -------------------------------
      # 差分適用（追加・更新・削除）
      # -------------------------------
      - name: Apply changes
        if: steps.first.outputs.first == 'false' && steps.validate.outputs.valid == 'true' && env.skip != 'true'
        run: |
          mkdir -p deps/drivers

          while read dir; do
            [ -z "$dir" ] && continue

            status=$(grep $'\tpackages/'"$dir"'/' changes.txt | head -n1 | cut -f1)

            if [ "$status" = "D" ]; then
              echo "Deleting $dir"
              rm -f "deps/drivers/$dir.js"
            else
              if [ -f "B/packages/$dir/$dir.js" ]; then
                echo "Updating $dir"
                cp -f "B/packages/$dir/$dir.js" "deps/drivers/$dir.js"
              elif [ -f "B/packages/$dir/index.js" ]; then
                echo "Updating $dir (index.js)"
                cp -f "B/packages/$dir/index.js" "deps/drivers/$dir.js"
              fi
            fi
          done < target_dirs.txt

      # -------------------------------
      # バージョン更新
      # -------------------------------
      - name: Update version file
        run: |
          echo "${{ steps.get_b.outputs.sha }}" > .b-dependency-version

      # -------------------------------
      # PR作成
      # -------------------------------
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync-chirimen-drivers
          commit-message: "Sync drivers from chirimen-drivers"
          title: "Sync drivers from chirimen-drivers"
          body: |
            Auto-sync from chirimen-drivers (/packages)

            - Weekly sync (Sunday 03:00 JST)
            - Includes add/update/delete
            - Fallback to full sync if history mismatch
            - Excludes dirs from deps/excluded.txt